# OpenChargeback Deployment Configuration
# Deployed via Woodpecker CI to openchargeback.dev.xram.net
#
# Service naming follows Caddy wildcard routing convention:
#   openchargeback-app → https://openchargeback.dev.xram.net

services:
  openchargeback-app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      - CONFIG_PATH=/app/instance/config.yaml
      - WEB_SECRET_KEY=${WEB_SECRET_KEY:-}  # App validates at startup; .env on host provides the value
    volumes:
      # Mount instance directory to match local paths (instance/billing.db, etc.)
      - ./instance:/app/instance
    expose:
      - "3000"
    networks:
      - default
      - gateway
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/login')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  default:
  gateway:
    external: true
    name: gateway-stack_gateway
